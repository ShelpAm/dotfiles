# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# Device, Resolution@Refresh rate, Position, Scale
# monitor=,preferred,auto,1
## Those two best values are not valid though..
# See ~/Documents/projects/cpp-demo-programs for the calculator.
monitor = eDP-1, 2560x1600@240, 0x0, 1.78125 # 1.78125
monitor = DP-1, 3840x2160@60, auto-right, 1.5


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = nautilus
# $menu = wofi --show drun
$menu = albert show


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# XDG Autostart is handled by systemd, and its target is activated in uwsm-managed session automatically.
# So targets that not supported by systemd can be configured here.

exec-once = albert
exec-once = swaync      # Notifications
exec-once = waybar      # Topbar
exec-once = hyprpaper   # Background

exec-once = systemctl --user start hyprpolkitagent.service
exec-once = systemctl --user start tmux.service # Worked in conjuntion with tmux-continuum.
# [old info] Since tmux-continuum is not working well, I won't use this for now.

exec-once = dbus-update-activation-environment --systemd --all


# fcitx5
# [NOTE] As far as I know, fcitx has been set to automatically started on startup via
# XDG Autostart Specification, which can be is installed from https://pkgs.org/search/?q=fcitx5-autostart .
# BUT this method has restriction that your GUI application should turn it on,
# whereas Hyprland won't do this for us. So start it manually.
exec-once = fcitx5 -d # Input method
# env = GTK_IM_MODULE,fcitx # Fcitx asked me not to set this.
# env = QT_IM_MODULE,fcitx
# env = XIM,fcitx
# env = XMODIFIERS,@im=fcitx
#==========================

# For using gnome-keyring-daemon outside desktop environment, but now
# autostarted by systemd.
# See gnome-keyring-daemon's status by running
#
#     systemctl --user enable gnome-keyring-daemon.service
#
# And if it's okay, then probably swaync, waybar and hyprpaper can also be
# autorun in this way.
# exec-once = dbus-update-activation-environment --all

exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] ~/.local/bin/launch-microsoft-edge.sh
exec-once = [workspace 8 silent] thunderbird
exec-once = [workspace 9 silent] qq
exec-once = [workspace 9 silent] flatpak run com.tencent.WeChat
# exec-once = [workspace 9 silent] wechat
exec-once = [workspace 10 silent] clash-verge # Proxy
# exec-once = [workspace 10 silent] ocs-2.6.7-setup-linux-x86_64.AppImage # Lost


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

## For Hyprland
env = HYPRCURSOR_SIZE,24

## For other applications
env = XCURSOR_SIZE,24

# Nvidia Video Acceleration
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct # VA-API hardware video acceleration, see https://wiki.hyprland.org/Nvidia/#va-api-hardware-video-acceleration

# Force wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto # Fixes softwares built with Electron.
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# fcitx
env = QT_IM_MODULE,fcitx

# QT tweaks
env = QT_QPA_PLATFORMTHEME,qt6ct # Intended for changing font size of QT apps.


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    # As memtioned above, to fix the flickering issue of nvidia.
    vfr = 0

    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(

    # Automatically turn on the screen when moving mouse or typing. (When the
    # screen is turned off)
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 250

    # Like sigmoid, ranges from -1.0 to 1.0. 0 means no modification.
    sensitivity = 0 
    accel_profile = flat
    force_no_accel = false

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more

# Since the mouse name often changes, we set for all its names.
device {
    name = razer-razer-viper-ultimate
    sensitivity = -0.35
}
device {
    name = razer-razer-viper-ultimate-1
    sensitivity = -0.35
}

xwayland {
    use_nearest_neighbor = true
    force_zero_scaling = true
}

render {
    ## Changes here from https://github.com/hyprwm/Hyprland/issues/7252#issuecomment-2345792172,
    # is to fix the flickering issue of nvidia.
    # So is as the sections of opengl, misc, and debug.
    # Original settings:
    # explicit_sync = 1
    # explicit_sync_kms = 1
    ## Upd: These two options have been removed. Now default to turn on.
    # explicit_sync = 2
    # explicit_sync_kms = 0
    direct_scanout = no
}

opengl {
    # As memtioned above, to fix the flickering issue of nvidia.
    nvidia_anti_flicker = 0
    # force_introspection = 2 # Removed, see my comment on https://github.com/hyprwm/Hyprland/issues/7252#issuecomment-2798726675
    # Update: TODO solution: https://github.com/hyprwm/Hyprland/issues/7252#issuecomment-2798747532
}

debug {
    # As memtioned above, to fix the flickering issue of nvidia.
    damage_tracking = 0
}

cursor {
    no_hardware_cursors = true
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Vim-like movements
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 2%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 2%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ShelpAm Custom keybindings

# Screenshot
# To toggle save directory, change the line containing $XDG_SCREENSHOTS_DIR in
# ${XDG_CONFIG_HOME}/user-dirs.dir
# bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
# bind = , Print, exec, grimblast copysave area # Improved version of `grim`, by hyprland developers
bind = , Print, exec, hyprshot -m region --freeze # Designed for hyprland
layerrule { # Fixes slurp issue
  name = no_anim_for_selection
  match:namespace = selection
  no_anim = on
}
# Turn off screen
bind = $mainMod, O, exec, sleep 1 && hyprctl dispatch dpms off

# Hyprpicker
bind = $mainMod, Print, exec, hyprpicker --format=rgb --autocopy # Improved version of `grim`, by hyprland developers

# Fullscreen
bind=SUPER,F,fullscreen

bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, movewindowto r
bind = $mainMod SHIFT, comma, layoutmsg, movewindowto l
bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
bind = $mainMod SHIFT, down, layoutmsg, movewindowto d

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus 1


# “smart gaps” / “no gaps when only”
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]


workspace = 1,  monitor:eDP-1
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1
workspace = 6,  monitor:DP-1
workspace = 7,  monitor:DP-1
workspace = 8,  monitor:DP-1
workspace = 9,  monitor:DP-1
workspace = 10, monitor:DP-1

